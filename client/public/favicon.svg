  <rect x="11" y="13" width="7"  height="2" rx="1" fill="#C9848C" opacity="0.8"/>
  <rect x="11" y="17" width="9"  height="2" rx="1" fill="#C9848C" opacity="0.8"/>
  <rect x="11" y="21" width="6"  height="2" rx="1" fill="#C9848C" opacity="0.8"/>
